<section
  class="auth-page container-fluid d-flex min-vh-100 align-items-center justify-content-center py-4"
>
  <div class="row w-100 justify-content-center">
    <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
      <div class="glass-panel rounded-4 p-4 p-md-5 animate-in">
        <p class="text-uppercase text-xs tracking-[0.25em] text-slate-300 mb-2">
          SpamShield Console
        </p>
        <h1 class="h2 fw-bold mb-3 text-white">Sign In</h1>
        <p class="text-slate-300 mb-4">
          Review risky messages and detect spam patterns before they reach users.
        </p>

        <form class="d-grid gap-3">
          <div>
            <label for="loginEmail" class="form-label text-slate-200">Work Email</label>
            <input
              id="loginEmail"
              type="email"
              class="form-control auth-input rounded-3 py-2"
              placeholder="analyst@spamshield.ai"
            />
          </div>

          <div>
            <label for="loginPassword" class="form-label text-slate-200">Password</label>
            <input
              id="loginPassword"
              type="password"
              class="form-control auth-input rounded-3 py-2"
              placeholder="Enter your password"
            />
          </div>

          <button type="submit" class="btn btn-warning fw-semibold rounded-3 py-2 mt-2">
            Sign In
          </button>
        </form>

        <div class="mt-4 d-flex justify-content-between align-items-center gap-2 flex-wrap">
          <a routerLink="/register" class="text-cyan-300 text-decoration-none fw-semibold"
            >Create an account</a
          >
          <a routerLink="/home" class="text-slate-300 text-decoration-none">Open detector</a>
        </div>
      </div>
    </div>
  </div>
</section>
