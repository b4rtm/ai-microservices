<section class="auth-page container-fluid d-flex min-vh-100 align-items-center justify-content-center py-4">
  <div class="row w-100 justify-content-center">
    <div class="col-12 col-sm-11 col-md-9 col-lg-6 col-xl-5">
      <div class="glass-panel rounded-4 p-4 p-md-5 animate-in">
        <p class="text-uppercase text-xs tracking-[0.25em] text-slate-300 mb-2">SpamShield Console</p>
        <h1 class="h2 fw-bold mb-3 text-white">Create Account</h1>
        <p class="text-slate-300 mb-4">Set up your workspace to analyze suspicious text and reduce spam incidents.</p>

        <form class="row g-3">
          <div class="col-12">
            <label for="registerEmail" class="form-label text-slate-200">Email</label>
            <input id="registerEmail" type="email" class="form-control auth-input rounded-3 py-2" placeholder="analyst@spamshield.ai" />
          </div>

          <div class="col-12 col-md-6">
            <label for="registerPassword" class="form-label text-slate-200">Password</label>
            <input id="registerPassword" type="password" class="form-control auth-input rounded-3 py-2" placeholder="Create password" />
          </div>

          <div class="col-12 col-md-6">
            <label for="registerPasswordConfirm" class="form-label text-slate-200">Confirm Password</label>
            <input id="registerPasswordConfirm" type="password" class="form-control auth-input rounded-3 py-2" placeholder="Repeat password" />
          </div>

          <div class="col-12 d-grid mt-2">
            <button type="submit" class="btn btn-warning fw-semibold rounded-3 py-2">Create Account</button>
          </div>
        </form>

        <p class="mt-4 mb-0 text-slate-300">
          Already have an account?
          <a routerLink="/login" class="text-cyan-300 text-decoration-none fw-semibold">Back to sign in</a>
        </p>
      </div>
    </div>
  </div>
</section>
