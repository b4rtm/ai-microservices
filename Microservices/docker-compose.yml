version: '3.8'

services:
  consul:
    image: consul:1.15
    ports:
      - "8500:8500"
    command: agent -dev -client=0.0.0.0
    
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_rootpw
      MYSQL_USER_FILE: /run/secrets/mysql_user
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
      MYSQL_DATABASE_FILE: /run/secrets/mysql_db
    secrets:
      - mysql_password
      - mysql_user
      - mysql_db
      - mysql_rootpw
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin:latest
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD_FILE: /run/secrets/mysql_rootpw
    ports:
      - "8080:80"
    secrets:
      - mysql_rootpw 
    depends_on:
      - mysql

  quarkus:
    image: quarkus-app:1.0
    environment:
      QUARKUS_DATASOURCE_USERNAME_FILE: /run/secrets/mysql_user
      QUARKUS_DATASOURCE_PASSWORD_FILE: /run/secrets/mysql_password
    secrets:
      - mysql_password
      - mysql_user
    ports:
      - "8082:8082"
    depends_on:
      - consul
      - mysql
 
  micronaut:
    image: micronaut-app:1.0
    ports:
      - "8081:8081"
    depends_on:
      - consul
      - mysql

secrets:
  mysql_password:
    external: true
  mysql_user:
    external: true
  mysql_db:
    external: true
  mysql_rootpw:
    external: true

volumes:
  mysql_data: