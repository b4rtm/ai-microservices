networks:
  microservices-net:
    driver: bridge

services:
  # ── Spam Detection Service (FastAPI + scikit-learn) ────────────────────────
  spam-detection-service:
    build:
      context: ./spam-fast-api
    ports:
      - "8000:8000"
    networks:
      - microservices-net
    healthcheck:
      # Uses Python stdlib so no curl/wget needed in the slim image
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── API Gateway (Spring Boot / Spring Cloud Gateway) ──────────────────────
  api-gateway:
    build:
      context: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPAM_SERVICE_URL=http://spam-detection-service:8000
    depends_on:
      spam-detection-service:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

  # ── Frontend (Angular + Nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/microservices-front
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    networks:
      - microservices-net
    restart: unless-stopped

