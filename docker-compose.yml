services:
  consul:
    image: consul:1.15
    ports:
      - "8500:8500"
    command: agent -dev -client=0.0.0.0
    networks:
      - microservices-net

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  tempo:
    image: grafana/tempo:2.10.4
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
    networks:
      - microservices-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports: []
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    networks:
      - microservices-net
    depends_on:
      - tempo

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - tempo
    networks:
      - microservices-net

  spam-history-service:
    build:
      context: ./microservices/quarkus
      dockerfile: Dockerfile
    image: quarkus-app:latest
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:mysql://mysql:3306/mydb
      QUARKUS_DATASOURCE_USERNAME: user
      QUARKUS_DATASOURCE_PASSWORD: password
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      OTEL_SERVICE_NAME: spam-history-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    networks:
      - microservices-net
    depends_on:
      consul:
        condition: service_started
      mysql:
        condition: service_healthy
      otel-collector:
        condition: service_started
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  spam-detection-service:
    build:
      context: ./spam-fast-api
      dockerfile: Dockerfile
    image: spam-detection-service:latest
    expose:
      - "8000"
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      OTEL_SERVICE_NAME: spam-detection-service
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    networks:
      - microservices-net
    depends_on:
      - consul
      - otel-collector
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    image: api-gateway:latest
    ports:
      - "8080:8080"
    environment:
      SPAM_SERVICE_URL: http://spam-detection-service:8000
      SPAM_HISTORY_SERVICE_URL: http://spam-history-service:8082
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      USER_SERVICE_URL: http://user-service:8081
      JWT_SECRET: sakldjasjfldkjgaosdifjdnasldkjaslkdjaslkdjfdsfuoasilkjdm
      OTEL_SERVICE_NAME: api-gateway
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    networks:
      - microservices-net
    depends_on:
      - spam-detection-service
      - consul
      - user-service
      - spam-history-service
      - otel-collector

  mysql-users:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: users_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_users_data:/var/lib/mysql
      - ./mysql-users-init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - microservices-net

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    image: user-service:latest
    expose:
      - "8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-users:3306/users_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      OTEL_SERVICE_NAME: user-service
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    networks:
      - microservices-net
    depends_on:
      - mysql-users
      - consul
      - otel-collector
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  frontend:
    build:
      context: ./frontend/microservices-front
      dockerfile: Dockerfile
    image: frontend-app:latest
    ports:
      - "4200:80"
    networks:
      - microservices-net
    depends_on:
      - api-gateway

networks:
  microservices-net:

volumes:
  mysql_users_data:
  mysql_data:
  grafana_data:
