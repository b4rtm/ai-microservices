server:
  port: 8081

spring:
  application:
    name: user-service

  cloud:
    consul:
      host: ${CONSUL_HOST:consul}
      port: ${CONSUL_PORT:8500}
      discovery:
        service-name: user-service
        instance-id: ${spring.application.name}-${HOSTNAME}  # 🔥 FIX
        health-check-path: /actuator/health
        health-check-interval: 10s
        prefer-ip-address: true
        deregister: true
        health-check-critical-timeout: 30s

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql-users:3306/users_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info