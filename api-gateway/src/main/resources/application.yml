server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        service-name: api-gateway
        instance-id: api-gateway-1
        health-check-path: /actuator/health
        health-check-interval: 10s
        prefer-ip-address: true
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        # ── Spam Detection Service ─────────────────────────────────────────────
        #   /spam/predict  →  http://spam-detection-service:8000/predict
        #   /spam/health   →  http://spam-detection-service:8000/health
        - id: spam-detection-service
          uri: ${SPAM_SERVICE_URL:http://spam-detection-service:8000}
          predicates:
            - Path=/spam/**
          filters:
            - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
