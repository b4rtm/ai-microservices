server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        service-name: api-gateway
        instance-id: api-gateway-1
        health-check-path: /actuator/health
        health-check-interval: 10s
        prefer-ip-address: true
    gateway:
      routes:
        # /spam/predict is handled by SpamOrchestrationController (orchestrates spam + history)
        # /spam/health is still proxied directly
        - id: spam-detection-service
          uri: ${SPAM_SERVICE_URL:http://spam-detection-service:8000}
          predicates:
            - Path=/spam/health
          filters:
            - StripPrefix=1
        - id: spam-history-service
          uri: ${SPAM_HISTORY_SERVICE_URL:http://spam-history-service:8082}
          predicates:
            - Path=/history/**
          filters:
            - StripPrefix=1
        - id: user-service
          uri: ${USER_SERVICE_URL:http://user-service:8081}
          predicates:
            - Path=/users/**

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
